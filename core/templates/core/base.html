<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BenGo Portal{% endblock %}</title>
    <style>
      :root { --bg:#0d0d0d; --panel:#111; --muted:#a3a3a3; --red:#e60000; --gold:#cfb04c; --white:#fff; }
      body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--bg); color: var(--white); }
      a { color: inherit; text-decoration: none; }
      .wrap { max-width: 1050px; margin: 0 auto; padding: 24px; }
      .top { display:flex; align-items:center; justify-content:space-between; padding: 16px 24px; border-bottom:1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.35); position: sticky; top: 0; backdrop-filter: blur(10px); }
      .brand { font-weight: 900; font-style: italic; letter-spacing: -0.02em; }
      .pill { display:inline-flex; align-items:center; gap:8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10); }
      .btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; padding: 12px 16px; border-radius: 12px; border:1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.06); color: var(--white); cursor:pointer; font-weight: 700; }
      .btn:hover { border-color: rgba(230,0,0,0.4); box-shadow: 0 0 0 3px rgba(230,0,0,0.12); }
      .btn-primary { background: rgba(230,0,0,0.16); border-color: rgba(230,0,0,0.40); }
      .grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
      .card { border:1px solid rgba(255,255,255,0.10); background: rgba(255,255,255,0.04); border-radius: 16px; padding: 18px; }
      .muted { color: var(--muted); }
      .h1 { font-size: 28px; margin: 0 0 10px; font-weight: 900; letter-spacing: -0.02em; }
      .h2 { font-size: 18px; margin: 0 0 6px; font-weight: 900; }
      .msg { margin: 16px 0; }
      .msg .card { padding: 12px 14px; }
      .tbl { width:100%; border-collapse: collapse; }
      .tbl th, .tbl td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align:left; }
      .badge { display:inline-flex; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; border:1px solid rgba(255,255,255,0.10); }
      .badge-draft { background: rgba(255,255,255,0.06); }
      .badge-pending { background: rgba(207,176,76,0.12); border-color: rgba(207,176,76,0.35); }
      .badge-approved { background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.35); }
      .badge-rejected { background: rgba(230,0,0,0.12); border-color: rgba(230,0,0,0.35); }
      .row { display:flex; gap: 16px; flex-wrap: wrap; }
      .col { flex: 1; min-width: 280px; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 12px; border:1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.25); color: var(--white); }
      textarea { resize: vertical; }
      label { display:block; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.65); margin: 12px 0 6px; }
      .actions { display:flex; gap: 10px; justify-content: flex-end; }
      .small { font-size: 12px; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="top">
      <div class="pill">
        <div class="brand">BenGo</div>
        <div class="muted small">Django Portal</div>
      </div>
      <div class="pill small">
        {% if request.user.is_authenticated %}
          <span class="muted">Signed in as</span> <strong>{{ request.user.username }}</strong>
          <a class="btn" href="{% url 'portal_logout' %}">Logout</a>
        {% else %}
          <a class="btn" href="{% url 'portal_login' %}">Login</a>
        {% endif %}
      </div>
    </div>

    <div class="wrap">
      {% if messages %}
        <div class="msg">
          {% for message in messages %}
            <div class="card">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </div>
  </body>
</html>

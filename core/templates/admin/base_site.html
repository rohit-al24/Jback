{% extends "admin/base.html" %}
{% load static %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | BenGo Admin{% endblock %}

{% block branding %}
<div class="bengo-branding">
    <h1 id="site-name">
        <a href="{% url 'admin:index' %}">
            <span class="bengo-ben">Ben</span><span class="bengo-go">Go</span>
            <span class="bengo-subtitle">Admin</span>
        </a>
    </h1>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrastyle %}
    {{ block.super }}
    <link rel="stylesheet" type="text/css" href="{% static 'admin/css/bengo-theme.css' %}">
{% endblock %}
